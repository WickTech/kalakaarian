version: '3.8'

# ===========================================
# LOCAL DEVELOPMENT
# ===========================================
# Run: docker-compose up -d
# Access:
#   Frontend: http://localhost:3000
#   Backend: http://localhost:5000
#   MongoDB: localhost:27017

services:
  # -----------------------------------------
  # MongoDB Database (Local)
  # -----------------------------------------
  mongodb:
    image: mongo:7
    container_name: kalakariaan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: kalakariaan
    networks:
      - kalakariaan-network

  # -----------------------------------------
  # Backend API
  # -----------------------------------------
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kalakariaan-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Local MongoDB
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/kalakariaan?authSource=admin
      # For Production MongoDB Atlas, comment above and use:
      # - MONGODB_URI=mongodb+srv://user:pass@cluster.mongodb.net/kalakariaan
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123-dev-only}
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - kalakariaan-network

  # -----------------------------------------
  # Frontend (Production Build)
  # -----------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kalakariaan-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - kalakariaan-network

# -----------------------------------------
# Networks
# -----------------------------------------
networks:
  kalakariaan-network:
    driver: bridge

# -----------------------------------------
# Volumes
# -----------------------------------------
volumes:
  mongo_data:
