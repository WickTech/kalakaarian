<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Kalakaarian</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #faf5ff;
        color: #1e1b4b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      img { width: 80px; height: 80px; margin-bottom: 1.5rem; border-radius: 16px; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
      p { color: #6b7280; font-size: 0.95rem; max-width: 320px; margin-bottom: 1.5rem; }
      button {
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.625rem 1.5rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #6d28d9; }
    </style>
  </head>
  <body>
    <img src="/k-logo-no-bg.png" alt="Kalakaarian" />
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Some pages may still be available from cache.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
